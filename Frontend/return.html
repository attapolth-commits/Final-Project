<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/style02.css">
</head>
<body>
    <button class="btn-logout" onclick="window.location.href='login.html'">ออกจากระบบ (Log out)</button>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="title-section">
                <h1>คืนครุภัณฑ์</h1>
                <p class="subtitle">Return Asset</p>
            </div>
            <div class="action-buttons">
                <a href="main.html" class="btn btn-primary">หน้าหลัก (Home)</a>
                <a href="borrow.html" class="btn btn-secondary">ยืมครุภัณฑ์ (Borrow)</a>
                <a href="information.html" class="btn btn-outline">ข้อมูลการยืม (History)</a>
            </div>
        </header>
        <main class="dashboard-content">
            <div class="table-header">
                <h2>Return List</h2>
            </div>
            
            <div class="table-wrapper">
                <table id="borrowTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Asset Code</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Price</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <dialog id="confirmModal" class="custom-dialog">
        <div class="dialog-content">
            <h3>ยืนยันการคืนครุภัณฑ์</h3>
            <p>Are you sure you want to return this product?</p>
            <div class="dialog-actions">
                <button id="cancelBtn" class="btn btn-outline" onclick="document.getElementById('confirmModal').close()">No, go back</button>
                <button id="confirmBtn" class="btn btn-danger">Yes, I'm sure</button>
            </div>
        </div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="js/app.js" type="module"></script>
    <script src="js/pages/return.js" type="module"></script>
</body>
</html>
